name: Release

# Tag push (v*.*.*) → verify + dry-run → human approval on the `crates-io`
# environment → publish via crates.io Trusted Publishing (OIDC, no stored
# token). `workflow_dispatch` runs the verify + dry-run half only, for
# rehearsing a release without publishing.
#
# See docs/releasing.md for the release runbook and the one-time setup
# (GitHub environment + crates.io Trusted Publishing config).

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to dry-run release for (e.g. v0.1.0)"
        required: true
        type: string

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-and-dry-run:
    name: Verify tag + cargo publish --dry-run
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: release

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "ref=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify tag matches Cargo.toml version
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.ref }}"
          # Strip leading 'v'
          tag_version="${tag#v}"
          # Pull `version = "..."` from the [package] table of the root crate.
          # awk: only consider lines inside the [package] section, take first version =.
          crate_version=$(awk '
            /^\[package\]/ { in_pkg=1; next }
            /^\[/ { in_pkg=0 }
            in_pkg && /^version[[:space:]]*=/ {
              gsub(/[" ]/, "", $0)
              sub(/^version=/, "", $0)
              print
              exit
            }
          ' Cargo.toml)
          echo "tag      = $tag_version"
          echo "Cargo.toml = $crate_version"
          if [ "$tag_version" != "$crate_version" ]; then
            echo "::error::Tag $tag does not match Cargo.toml version $crate_version"
            exit 1
          fi

      - name: cargo publish --dry-run
        run: cargo publish --dry-run --all-features

  # ----- Human gate -----
  # This job is bound to the `crates-io` GitHub environment, which is
  # configured with a required reviewer: the workflow pauses here until a
  # maintainer approves the deployment in the GitHub UI. Only real tag
  # pushes reach this job — workflow_dispatch runs stay dry-run-only.
  #
  # Auth is crates.io Trusted Publishing: the job exchanges its GitHub OIDC
  # identity (`id-token: write`) for a 30-minute publish token scoped to this
  # crate. No long-lived CARGO_REGISTRY_TOKEN exists anywhere in the repo.
  publish:
    name: Publish to crates.io
    needs: verify-and-dry-run
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: release

      - name: Authenticate with crates.io (OIDC)
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish --all-features

  # ----- GitHub release + notes -----
  # After a successful publish, render release notes for the span since the
  # previous tag (git-cliff over the conventional-commit history, config in
  # cliff.toml) and create the GitHub release. `-alpha`/`-beta`/`-rc` tags
  # are marked as prereleases.
  github-release:
    name: Create GitHub release
    needs: publish
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # git-cliff needs the full history and all tags to find the
          # previous release boundary.
          fetch-depth: 0

      - name: Generate release notes (git-cliff)
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          prerelease=""
          case "${GITHUB_REF_NAME}" in
            *-alpha*|*-beta*|*-rc*) prerelease="--prerelease" ;;
          esac
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file RELEASE_NOTES.md \
            --verify-tag \
            $prerelease
