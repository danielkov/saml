name: Audit

on:
  push:
    branches: [main]
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "deny.toml"
      - ".github/workflows/audit.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "deny.toml"
      - ".github/workflows/audit.yml"
  schedule:
    # Daily at 06:00 UTC — catches newly-published advisories on a passive repo
    - cron: "0 6 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  cargo-deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          # Default scopes: advisories bans licenses sources
          # All four are configured in deny.toml.
          arguments: --all-features

  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: audit
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: cargo audit
        # RUSTSEC-2023-0071 (rsa "Marvin Attack") is accepted with documented
        # rationale — see SECURITY.md and the matching entry in deny.toml. No
        # fixed release exists; the exploitable v1.5 vector is off by default.
        # cargo-audit cannot ignore one exact yanked package. Yank enforcement
        # therefore lives in cargo-deny, whose only version-pinned exception is
        # spin 0.9.8. Vulnerabilities still fail here by default; preserve the
        # other strict warning classes explicitly and skip only the duplicate
        # yank scan.
        run: >-
          cargo audit --no-yanked
          --deny unmaintained
          --deny unsound
          --ignore RUSTSEC-2023-0071
