name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ---------------------------------------------------------------------------
  # Format check (fast, fail-fast)
  # ---------------------------------------------------------------------------
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable + rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  # ---------------------------------------------------------------------------
  # Clippy: run across every feature combo we test
  # Uses stable toolchain. Clippy on MSRV / beta would just duplicate noise.
  # ---------------------------------------------------------------------------
  clippy:
    name: clippy (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: all-features
            flags: --all-features
          - name: default-features
            flags: ""
          - name: no-default-features
            flags: --no-default-features
          - name: artifact+weak (default)
            flags: --features "artifact-binding weak-algos"
          - name: artifact+weak (no-default)
            flags: --features "artifact-binding weak-algos" --no-default-features
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: clippy-${{ matrix.name }}
      - name: cargo clippy ${{ matrix.flags }}
        run: cargo clippy --workspace --all-targets ${{ matrix.flags }} -- -D warnings

  # ---------------------------------------------------------------------------
  # Tests: matrix on Rust toolchain X feature combo, Ubuntu only
  # ---------------------------------------------------------------------------
  test:
    name: test ${{ matrix.rust }} / ${{ matrix.features.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, beta, "1.91.0"]
        features:
          - name: default
            flags: ""
          - name: all-features
            flags: --all-features
          - name: no-default-features
            flags: --no-default-features
          - name: artifact+weak (default)
            flags: --features "artifact-binding weak-algos"
          - name: artifact+weak (no-default)
            flags: --features "artifact-binding weak-algos" --no-default-features
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: test-${{ matrix.rust }}-${{ matrix.features.name }}
      - name: cargo test ${{ matrix.features.flags }}
        # Exclude the keycloak example from default test runs — it requires
        # SAML_RUN_KEYCLOAK_E2E=1 and a live Keycloak instance.
        run: cargo test --workspace --exclude saml-keycloak-example ${{ matrix.features.flags }}

  # ---------------------------------------------------------------------------
  # xmlsec1 interop: prove a foreign reference verifier (the XML Security
  # Library that Shibboleth / SimpleSAMLphp / mod_auth_mellon build on) accepts
  # our emitted XML-DSig signatures. The test self-skips when xmlsec1 is absent,
  # so this job exists to guarantee it actually runs somewhere.
  # ---------------------------------------------------------------------------
  xmlsec-interop:
    name: xmlsec1 interop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install xmlsec1
        run: sudo apt-get update && sudo apt-get install -y xmlsec1
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: xmlsec-interop
      - name: cargo test --test xmlsec_interop
        run: cargo test --test xmlsec_interop

  # ---------------------------------------------------------------------------
  # Fuzz targets must keep building. Their harness bodies are `#[cfg(fuzzing)]`,
  # so a normal `cargo build`/clippy never compiles them — a fuzz target can
  # silently rot when a public API it calls changes. This job compiles every
  # target under the cargo-fuzz toolchain (no running) to catch that.
  # ---------------------------------------------------------------------------
  fuzz-build:
    name: fuzz build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          key: fuzz-build
      # Prebuilt binary — compiling cargo-fuzz from source on nightly pulls
      # transitive deps (old rustix) that fail to build against current nightly.
      - name: Install cargo-fuzz
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz@0.13.1
      # Pin the gnu target explicitly: the prebuilt cargo-fuzz defaults to the
      # musl host triple, whose std isn't installed on the nightly toolchain
      # (E0463 can't find `core`). gnu is the standard ASan fuzzing target and
      # ships std with the toolchain.
      - name: cargo fuzz build
        run: cargo +nightly fuzz build --target x86_64-unknown-linux-gnu

  # ---------------------------------------------------------------------------
  # Coverage: instrument the workspace with cargo-llvm-cov, emit lcov, and push
  # to Codecov. Mirrors the test job's keycloak-example exclusion. Uploads
  # authenticate via GitHub OIDC (requires the Codecov GitHub App on the repo;
  # plain tokenless upload is rejected for pushes to main). Never fail CI on
  # an upload hiccup.
  # ---------------------------------------------------------------------------
  coverage:
    name: coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable + llvm-tools)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          key: coverage
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov@0.8.7
      - name: cargo llvm-cov
        run: cargo llvm-cov --workspace --exclude saml-keycloak-example --lcov --output-path lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          use_oidc: true
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # Cross-platform smoke test: default features only, stable only.
  # Keeps CI minutes reasonable; full matrix lives on Linux.
  # ---------------------------------------------------------------------------
  cross-platform:
    name: smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: smoke-${{ matrix.os }}
      - name: cargo test (default features)
        run: cargo test --workspace --exclude saml-keycloak-example

  # ---------------------------------------------------------------------------
  # Documentation must build cleanly.
  # ---------------------------------------------------------------------------
  doc:
    name: rustdoc
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: doc
      - name: cargo doc --all-features
        run: cargo doc --workspace --all-features --no-deps

  # ---------------------------------------------------------------------------
