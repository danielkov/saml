  # ─── SAML provider ─────────────────────────────────────────────────────
  - id: provider
    model: authentik_providers_saml.samlprovider
    identifiers:
      name: saml-axum-demo
    attrs:
      acs_url: http://localhost:3000/saml/acs
      sls_url: http://localhost:3000/saml/slo
      audience: saml-axum-demo
      # Without an issuer override, Authentik uses the metadata URL as the
      # EntityID — that's what the SP will see in <Issuer>.
      issuer_override: ""
      sp_binding: post
      sls_binding: post
      sign_assertion: true
      sign_response: true
      sign_logout_request: true
      sign_logout_response: true
      digest_algorithm: http://www.w3.org/2001/04/xmlenc#sha256
      signature_algorithm: http://www.w3.org/2001/04/xmldsig-more#rsa-sha256
      # IdP signing keypair — use Authentik's auto-generated self-signed
      # cert. The SP fetches the IdP metadata at startup, which embeds the
      # matching public cert, so we never need to copy it manually.
      signing_kp:
        !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
      # Verification keypair — the SP signs AuthnRequests, and we pin its
      # cert here so Authentik verifies the signature instead of accepting
      # an unsigned request.
      verification_kp: !KeyOf sp-verification-cert
      name_id_mapping: !KeyOf mapping-name-id
      property_mappings:
        - !KeyOf mapping-email
        - !KeyOf mapping-display-name
        - !KeyOf mapping-given-name
        - !KeyOf mapping-surname
        - !KeyOf mapping-department
      # Hook the provider into the stock authorization + invalidation
      # flows so users don't see a consent screen on every login.
      authorization_flow:
        !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow:
        !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]

  # ─── Application ───────────────────────────────────────────────────────
  - id: application
    model: authentik_core.application
    identifiers:
      slug: saml-axum-demo
    attrs:
      name: saml-axum-demo
      provider: !KeyOf provider
      meta_launch_url: http://localhost:3000/
      meta_description: Axum-based Service Provider demo for the saml crate.
      meta_publisher: saml-axum-demo
      open_in_new_tab: false
      policy_engine_mode: any

  # ─── Test user ─────────────────────────────────────────────────────────
  # `password` on the user model hashes + stores the supplied plaintext
  # via Authentik's password backend. `attributes` is a free-form JSON
  # blob that property mappings can read with `request.user.attributes`.
  - id: user-alice
    model: authentik_core.user
    identifiers:
      username: alice
    attrs:
      name: Alice Anderson
      email: alice@saml-demo.local
      password: password
      is_active: true
      path: users
      type: internal
      attributes:
        department: platform
