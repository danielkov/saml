version: 1
metadata:
  name: saml-axum-demo SAML provider
  labels:
    blueprints.goauthentik.io/description: |
      Provisions everything the saml-axum-demo SP needs: SAML property
      mappings, a signing keypair (the SP cert for verifying inbound
      AuthnRequests), a SAML provider, an application binding, and one
      test user `alice@saml-demo.local`.

entries:
  # ─── Property mappings ─────────────────────────────────────────────────
  # Authentik's "property mappings" are the equivalent of Keycloak's
  # protocol mappers: short Python expressions that pull values out of the
  # authenticated user object and emit them as SAML <AttributeStatement>
  # entries. The `friendly_name` shows up as `FriendlyName` on the wire
  # alongside the formal `saml_name` URI.

  - id: mapping-email
    model: authentik_providers_saml.samlpropertymapping
    identifiers:
      name: "saml-axum-demo: email"
    attrs:
      friendly_name: mail
      saml_name: urn:oid:0.9.2342.19200300.100.1.3
      expression: |
        return request.user.email

  - id: mapping-display-name
    model: authentik_providers_saml.samlpropertymapping
    identifiers:
      name: "saml-axum-demo: displayName"
    attrs:
      friendly_name: displayName
      saml_name: urn:oid:2.16.840.1.113730.3.1.241
      expression: |
        return request.user.name

  - id: mapping-given-name
    model: authentik_providers_saml.samlpropertymapping
    identifiers:
      name: "saml-axum-demo: givenName"
    attrs:
      friendly_name: givenName
      saml_name: urn:oid:2.5.4.42
      expression: |
        # Authentik stores the full name in `name`. Split off the first
        # whitespace-delimited token as the given name.
        return (request.user.name or "").split(" ", 1)[0]

  - id: mapping-surname
    model: authentik_providers_saml.samlpropertymapping
    identifiers:
      name: "saml-axum-demo: sn"
    attrs:
      friendly_name: sn
      saml_name: urn:oid:2.5.4.4
      expression: |
        parts = (request.user.name or "").split(" ", 1)
        return parts[1] if len(parts) > 1 else ""

  - id: mapping-department
    model: authentik_providers_saml.samlpropertymapping
    identifiers:
      name: "saml-axum-demo: department"
    attrs:
      friendly_name: department
      saml_name: department
      expression: |
        return request.user.attributes.get("department", "")

  # NameID mapping: assert the user's email as the SAML NameID value.
  # The `saml_name` is unused when the mapping is referenced via
  # `provider.name_id_mapping` (Authentik takes the value from the
  # expression directly), but the serializer rejects an empty string,
  # so we set it to the NameID format URI as a self-documenting marker.
  - id: mapping-name-id
    model: authentik_providers_saml.samlpropertymapping
    identifiers:
      name: "saml-axum-demo: NameID (email)"
    attrs:
      saml_name: urn:oasis:names:tc:SAML:1.1:nameid-format:emailAddress
      expression: |
        return request.user.email

  # ─── SP signing certificate (verification_kp) ──────────────────────────
  # Authentik calls this object a "CertificateKeyPair". For the SP cert we
  # only need the certificate half — the private key stays in the Axum
  # process. Setting `key_data: ""` is fine; Authentik treats it as a
  # verification-only certificate.
  - id: sp-verification-cert
    model: authentik_crypto.certificatekeypair
    identifiers:
      name: saml-axum-demo SP signing cert
    attrs:
      certificate_data: |
        -----BEGIN CERTIFICATE-----
        MIIDEzCCAfugAwIBAgIUTfhpA0maJrRIF9RjS6fjhKqEKX0wDQYJKoZIhvcNAQEL
        BQAwGTEXMBUGA1UEAwwOc2FtbC1heHVtLWRlbW8wHhcNMjYwNTI3MTkxODUzWhcN
        MzYwNTI0MTkxODUzWjAZMRcwFQYDVQQDDA5zYW1sLWF4dW0tZGVtbzCCASIwDQYJ
        KoZIhvcNAQEBBQADggEPADCCAQoCggEBAJbM3HcO7+PduWeQLcJsCWqPdoeJjOSY
        xp6wz3iH4WWWQhjOy2BQ0ljBvbiL/MtVynjj1S+L0cb93+O9We304npqIbhmGpIP
        HeeGK6YIwlnmvLChCvYR/Q2DrPxI7Oy+sIwjFd8nsaIOyWD8SrcDsqEuLVE+9lEt
