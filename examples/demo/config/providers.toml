# saml-demo / providers.toml
#
# Each [[provider]] block describes one IdP this SP knows how to drive
# through the Web Browser SSO profile. Override any `metadata_url` at
# runtime with `SAML_DEMO_PROVIDER_<UPPER_ID>_METADATA_URL` (e.g.
# SAML_DEMO_PROVIDER_KEYCLOAK_METADATA_URL=http://...) — useful for
# pointing at a private Zitadel or a non-default Keycloak port.
#
# The `attribute_keys` lists are walked in order. The first hit wins, so
# put the most specific vendor URI first and the generic short name last.

# ─── Local IdPs (examples/idps/docker-compose.yml) ──────────────────

[[provider]]
id = "keycloak"
label = "Keycloak"
metadata_url = "http://localhost:8080/realms/saml-demo/protocol/saml/descriptor"
accent_color = "#cd0000"
brand_initial = "K"
requested_name_id_format = "EmailAddress"
attribute_keys.email = [
    "mail",
    "urn:oid:0.9.2342.19200300.100.1.3",
    "http://schemas.xmlsoap.org/ws/2005/05/identity/claims/emailaddress",
]
attribute_keys.display_name = [
    "displayName",
    "urn:oid:2.16.840.1.113730.3.1.241",
    "http://schemas.xmlsoap.org/ws/2005/05/identity/claims/name",
]
attribute_keys.given_name = ["givenName", "urn:oid:2.5.4.42"]
attribute_keys.surname = ["sn", "urn:oid:2.5.4.4"]
attribute_keys.department = ["department"]

[[provider]]
id = "authentik"
label = "Authentik"
metadata_url = "http://localhost:9000/application/saml/saml-axum-demo/metadata/"
accent_color = "#fd4b2d"
brand_initial = "A"
requested_name_id_format = "EmailAddress"
attribute_keys.email = [
    "mail",
    "urn:oid:0.9.2342.19200300.100.1.3",
    "http://schemas.xmlsoap.org/ws/2005/05/identity/claims/emailaddress",
    "email",
]
attribute_keys.display_name = [
    "displayName",
    "urn:oid:2.16.840.1.113730.3.1.241",
    "http://schemas.xmlsoap.org/ws/2005/05/identity/claims/name",
    "givenName",
]
attribute_keys.given_name = ["givenName"]
attribute_keys.surname = ["sn"]
attribute_keys.department = ["department"]

[[provider]]
id = "fusionauth"
label = "FusionAuth"
metadata_url = "http://localhost:9011/samlv2/metadata/e9fdb985-9173-4e01-9d73-ac2d60d1dc8e"
# FusionAuth advertises /samlv2/login/{applicationId} in metadata, which is the
# IdP-initiated entry point. SP-initiated AuthnRequests must hit the tenant URL
# instead; otherwise FA returns "AuthnRequest contained an invalid issuer".
sso_url_override = "http://localhost:9011/samlv2/login/d7d09513-a3f5-401c-9685-34ab6c552453"
# Same routing quirk applies to logout: SP-init LogoutRequest must hit
# /samlv2/logout/{tenantId}, not the {applicationId} URL the metadata
# advertises.
slo_url_override = "http://localhost:9011/samlv2/logout/d7d09513-a3f5-401c-9685-34ab6c552453"
# FA's logout endpoint doesn't DEFLATE-decompress Redirect-binding payloads
# and rejects them with "Invalid byte 1 of 1-byte UTF-8 sequence". POST works.
prefer_slo_binding = "POST"
# FA's Response <Issuer> uses tenantId, but the metadata's entityID uses
# applicationId. ACS routing needs the runtime value, not the metadata one.
idp_entity_id_override = "http://localhost:9011/samlv2/d7d09513-a3f5-401c-9685-34ab6c552453"
# FA's metadata XML doesn't include a <KeyDescriptor>, so the SP needs the IdP
# signing cert configured out-of-band. The cert is imported into FA at boot via
# kickstart and lives here for the SP to trust.
extra_signing_cert_paths = ["examples/idps/fusionauth/idp/cert.pem"]
accent_color = "#f6843a"
brand_initial = "F"
requested_name_id_format = "EmailAddress"
attribute_keys.email = [
    "email",
    "mail",
    "urn:oid:0.9.2342.19200300.100.1.3",
]
attribute_keys.display_name = [
    "displayName",
    "urn:oid:2.16.840.1.113730.3.1.241",
    "givenName",
]
attribute_keys.given_name = ["givenName"]
attribute_keys.surname = ["sn", "surname"]
attribute_keys.department = ["department"]

# ─── Cloud IdPs ─────────────────────────────────────────────────────

[[provider]]
id = "zitadel"
label = "Zitadel"
metadata_url = "https://saml-demo-2ubgsa.us1.zitadel.cloud/saml/v2/metadata"
# Zitadel's /saml/v2/SLO endpoint advertises HTTP-Redirect but rejects the
# DEFLATE+base64 payload with "XML syntax error on line 1: invalid character
# entity" — apparently their SLO parser doesn't handle the binding correctly.
# POST works.
prefer_slo_binding = "POST"
accent_color = "#5469d4"
brand_initial = "Z"
requested_name_id_format = "Persistent"
# Zitadel emits NameID `persistent`, never email. Don't fall back through
# the Subject when the dashboard is looking for an email address.
use_name_id_as_email_fallback = false
attribute_keys.email = ["Email", "mail", "email"]
attribute_keys.display_name = [
    "FullName",
    "displayName",
    "FirstName",
    "UserName",
]
attribute_keys.given_name = ["FirstName"]
attribute_keys.surname = ["SurName"]
attribute_keys.department = []

[[provider]]
id = "auth0"
label = "Auth0"
metadata_url = "https://dev-x8koaq5b27hij85j.us.auth0.com/samlp/metadata/5gRkInIpQbXpu8TcYfuXCmEDc80c8rnF"
accent_color = "#eb5424"
brand_initial = "0"
requested_name_id_format = "EmailAddress"
# Auth0's SAML addon emits its claims under the WS-* xmlsoap namespace.
attribute_keys.email = [
    "http://schemas.xmlsoap.org/ws/2005/05/identity/claims/emailaddress",
    "E-Mail Address",
    "email",
    "mail",
]
attribute_keys.display_name = [
    "http://schemas.xmlsoap.org/ws/2005/05/identity/claims/name",
    "Name",
    "displayName",
]
attribute_keys.given_name = [
    "http://schemas.xmlsoap.org/ws/2005/05/identity/claims/givenname",
    "Given Name",
    "givenName",
]
attribute_keys.surname = [
    "http://schemas.xmlsoap.org/ws/2005/05/identity/claims/surname",
    "Surname",
    "sn",
]
attribute_keys.department = []

[[provider]]
id = "descope"
label = "Descope"
metadata_url = "https://api.descope.com/v1/auth/saml/idp/metadata?app=P3ELzaM575ix5hTMvT5VxTtfZ3ZB-saml_axum_demo"
accent_color = "#5b3bff"
brand_initial = "D"
requested_name_id_format = "EmailAddress"
attribute_keys.email = ["email", "Email", "mail"]
attribute_keys.display_name = [
    "displayName",
    "Display Name",
    "FullName",
    "givenName",
]
attribute_keys.given_name = ["givenName", "Given Name"]
attribute_keys.surname = ["surname", "sn", "Family Name"]
attribute_keys.department = []

# ─── Standalone Rust IdP (examples/idp) ─────────────────────────────

[[provider]]
id = "rust-idp"
label = "Rust IdP"
metadata_url = "http://localhost:3001/metadata"
# The saml crate's IdP-side `consume_logout_request` doesn't accept a
# detached HTTP-Redirect signature payload — only enveloped XML-DSig
# signatures over POST/SOAP bindings. Pin SP-init SLO to POST so the
# IdP can actually verify the signature.
prefer_slo_binding = "POST"
accent_color = "#dea584"
brand_initial = "R"
requested_name_id_format = "EmailAddress"
notes = ["Built on the same saml crate as the SP — closes the loop end-to-end"]
attribute_keys.email = ["email", "urn:oid:0.9.2342.19200300.100.1.3"]
attribute_keys.display_name = ["displayName"]
attribute_keys.given_name = ["givenName"]
attribute_keys.surname = ["sn"]
attribute_keys.department = ["department"]

# ─── Cloud IdPs (continued) ─────────────────────────────────────────

[[provider]]
id = "asgardeo"
label = "Asgardeo"
metadata_url = "https://api.asgardeo.io/t/samldemo/identity/metadata/saml2"
accent_color = "#ff7300"
brand_initial = "@"
requested_name_id_format = "EmailAddress"
# Asgardeo advertises emailAddress in its IDPSSODescriptor but populates
# the NameID with an opaque `userid` value (not the actual email), so a
# Subject-based email fallback would render the wrong thing on the
# dashboard. Disable the fallback and rely on the WSO2 claim URI.
use_name_id_as_email_fallback = false
attribute_keys.email = [
    "http://wso2.org/claims/emailaddress",
    "emailaddress",
    "email",
    "mail",
]
attribute_keys.display_name = [
    "http://wso2.org/claims/displayname",
    "displayname",
    "http://wso2.org/claims/fullname",
    "http://wso2.org/claims/givenname",
    "givenname",
    "http://wso2.org/claims/username",
]
attribute_keys.given_name = [
    "http://wso2.org/claims/givenname",
    "givenname",
]
attribute_keys.surname = [
    "http://wso2.org/claims/lastname",
    "http://wso2.org/claims/surname",
    "lastname",
]
attribute_keys.department = []
